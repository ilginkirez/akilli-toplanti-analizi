services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - meeting-net

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    command:
      - --config-body
      - |
        port: 7880
        rtc:
          tcp_port: ${LIVEKIT_RTC_TCP_PORT:-7881}
          port_range_start: ${LIVEKIT_RTC_UDP_START:-50000}
          port_range_end: ${LIVEKIT_RTC_UDP_END:-50100}
          use_external_ip: true
          allow_tcp_fallback: true
          turn_servers:
            - host: ${TURN_DOMAIN}
              port: 3478
              protocol: udp
              secret: ${TURN_SECRET}
              ttl: 86400
            - host: ${TURN_DOMAIN}
              port: 3478
              protocol: tcp
              secret: ${TURN_SECRET}
              ttl: 86400
        redis:
          address: redis:6379
        room:
          empty_timeout: ${LIVEKIT_ROOM_EMPTY_TIMEOUT:-300}
          departure_timeout: ${LIVEKIT_ROOM_DEPARTURE_TIMEOUT:-20}
        keys:
          ${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}
        webhook:
          api_key: ${LIVEKIT_API_KEY}
          urls:
            - http://backend:8000/api/livekit/webhook
    ports:
      - "${LIVEKIT_RTC_TCP_PORT:-7881}:7881/tcp"
      - "${LIVEKIT_RTC_UDP_START:-50000}-${LIVEKIT_RTC_UDP_END:-50100}:${LIVEKIT_RTC_UDP_START:-50000}-${LIVEKIT_RTC_UDP_END:-50100}/udp"
    networks:
      - meeting-net

  egress:
    image: livekit/egress:latest
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    environment:
      EGRESS_CONFIG_BODY: |
        api_key: ${LIVEKIT_API_KEY}
        api_secret: ${LIVEKIT_API_SECRET}
        ws_url: ws://livekit:7880
        insecure: true
        redis:
          address: redis:6379
        health_port: 8080
        log_level: info
    volumes:
      - ./meeting_analyzer/recordings:/out/recordings
    depends_on:
      - redis
      - livekit
    networks:
      - meeting-net

  coturn:
    image: coturn/coturn:4.6.3
    restart: unless-stopped
    command:
      - -n
      - --fingerprint
      - --use-auth-secret
      - --static-auth-secret=${TURN_SECRET}
      - --realm=${TURN_DOMAIN}
      - --server-name=${TURN_DOMAIN}
      - --listening-ip=0.0.0.0
      - --external-ip=${PUBLIC_IP}
      - --listening-port=3478
      - --min-port=${TURN_RELAY_START:-51000}
      - --max-port=${TURN_RELAY_END:-51100}
      - --no-cli
      - --no-multicast-peers
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "${TURN_RELAY_START:-51000}-${TURN_RELAY_END:-51100}:${TURN_RELAY_START:-51000}-${TURN_RELAY_END:-51100}/tcp"
      - "${TURN_RELAY_START:-51000}-${TURN_RELAY_END:-51100}:${TURN_RELAY_START:-51000}-${TURN_RELAY_END:-51100}/udp"
    networks:
      - meeting-net

  backend:
    build:
      context: ./meeting_analyzer
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - LIVEKIT_API_URL=${LIVEKIT_API_URL:-http://livekit:7880}
      - LIVEKIT_WS_URL=${LIVEKIT_WS_URL}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - AI_TRANSCRIBE_MODEL=${AI_TRANSCRIBE_MODEL:-whisper-large-v3}
      - LIVEKIT_ROOM_EMPTY_TIMEOUT=${LIVEKIT_ROOM_EMPTY_TIMEOUT:-300}
      - LIVEKIT_ROOM_DEPARTURE_TIMEOUT=${LIVEKIT_ROOM_DEPARTURE_TIMEOUT:-20}
      - LIVEKIT_ROOM_MAX_PARTICIPANTS=${LIVEKIT_ROOM_MAX_PARTICIPANTS:-4}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./meeting_analyzer/src/storage:/app/src/storage
      - ./meeting_analyzer/recordings:/app/recordings
      - /tmp/audio:/tmp/audio
    depends_on:
      - redis
      - livekit
      - coturn
      - egress
    networks:
      - meeting-net

  celery_worker:
    build:
      context: ./meeting_analyzer
      dockerfile: Dockerfile
    command: celery -A src.celery_app worker --loglevel=info --concurrency=4
    restart: unless-stopped
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./meeting_analyzer:/app
      - /tmp/audio:/tmp/audio
    depends_on:
      - redis
    networks:
      - meeting-net

  celery_beat:
    build:
      context: ./meeting_analyzer
      dockerfile: Dockerfile
    command: celery -A src.celery_app beat --loglevel=info
    restart: unless-stopped
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - meeting-net

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.oracle
      args:
        VITE_API_URL: ""
        VITE_LIVEKIT_URL: ${LIVEKIT_WS_URL}
    restart: unless-stopped
    depends_on:
      - backend
      - livekit
    environment:
      - APP_DOMAIN=${APP_DOMAIN}
      - RTC_DOMAIN=${RTC_DOMAIN}
    ports:
      - "${GATEWAY_HTTP_PORT:-80}:80"
      - "${GATEWAY_HTTPS_PORT:-443}:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - meeting-net

networks:
  meeting-net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
