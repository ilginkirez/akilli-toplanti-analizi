services:
  # 0. Redis (Message Queue)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - meeting-net

  # 1. OpenVidu Server (Development Mode)
  openvidu:
    image: openvidu/openvidu-dev:2.30.0
    ports:
      - "4443:${HTTPS_PORT:-4443}"
    environment:
      - DOMAIN_OR_PUBLIC_IP=${DOMAIN_OR_PUBLIC_IP:-localhost}
      - HTTPS_PORT=${HTTPS_PORT:-4443}
      - FORCE_PLAIN_HTTP=${FORCE_PLAIN_HTTP:-true}
      - OPENVIDU_SECRET=${OPENVIDU_SECRET:-MY_SECRET}
      - OPENVIDU_RECORDING=true
      - OPENVIDU_RECORDING_PATH=/opt/openvidu/recordings
      - OPENVIDU_RECORDING_AUTOSTOP_TIMEOUT=5
      - OPENVIDU_CDR=true
      - OPENVIDU_CDR_PATH=/opt/openvidu/cdr
      - OPENVIDU_WEBHOOK=true
      - OPENVIDU_WEBHOOK_ENDPOINT=${OPENVIDU_WEBHOOK_ENDPOINT:-http://backend:8000/api/openvidu/webhook}
      - OPENVIDU_WEBHOOK_EVENTS=["sessionCreated","sessionDestroyed","participantJoined","participantLeft","webrtcConnectionCreated","webrtcConnectionDestroyed","recordingStatusChanged"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./meeting_analyzer/recordings:/opt/openvidu/recordings
      - ./meeting_analyzer/cdr:/opt/openvidu/cdr
    networks:
      - meeting-net

  # 2. Python Backend (FastAPI)
  backend:
    build:
      context: ./meeting_analyzer
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENVIDU_URL=${OPENVIDU_URL:-http://openvidu:4443}
      - OPENVIDU_SECRET=${OPENVIDU_SECRET:-MY_SECRET}
      - SSL_VERIFY=${SSL_VERIFY:-false}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./meeting_analyzer/src/storage:/app/src/storage
      - ./meeting_analyzer/recordings:/app/recordings
      - /tmp/audio:/tmp/audio
    depends_on:
      - openvidu
      - redis
    networks:
      - meeting-net

  # 2.1 Celery Worker (Async Audio Processing)
  celery_worker:
    build:
      context: ./meeting_analyzer
      dockerfile: Dockerfile
    command: celery -A src.celery_app worker --loglevel=info --concurrency=4
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./meeting_analyzer:/app
      - /tmp/audio:/tmp/audio
    depends_on:
      - redis
    networks:
      - meeting-net
    deploy:
      replicas: 2

  # 2.2 Celery Beat (Scheduled Tasks)
  celery_beat:
    build:
      context: ./meeting_analyzer
      dockerfile: Dockerfile
    command: celery -A src.celery_app beat --loglevel=info
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - meeting-net

  # 3. React Frontend (Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=${VITE_API_URL:-}
    depends_on:
      - backend
    networks:
      - meeting-net

networks:
  meeting-net:
    driver: bridge
